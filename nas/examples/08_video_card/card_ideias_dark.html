<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>astronomia e espaço</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(165deg, #0f172a 0%, #020617 100%);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      width: min(960px, 100%);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 16px;
      padding: 2.5rem 2.75rem;
      background: rgba(15, 23, 42, 0.65);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }
    .accent {
      width: 48px;
      height: 4px;
      border-radius: 2px;
      background: #3b82f6;
      margin-bottom: 1.25rem;
    }
    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 700;
      line-height: 1.2;
      color: #f8fafc;
    }
    .subtitle {
      margin: 0 0 1.5rem;
      font-size: 1.05rem;
      color: #cbd5e1;
      line-height: 1.5;
    }
    .brand {
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #94a3b8;
    }
    .tagline {
      margin-top: 0.35rem;
      font-size: 0.95rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <article class="card">
    <div class="accent" aria-hidden="true"></div>
    <h1>astronomia e espaço</h1>
    <p class="subtitle"> </p>
    <div class="brand">Ideias Factory · Video Pipeline</div>
    <p class="tagline">astronomia e espaço</p>
  </article>
</body>
</html>
